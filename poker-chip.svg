<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Poker chip">
  <defs>
    <radialGradient id="g1" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#f4f4f4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cfcfcf"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="120" cy="120" r="110" fill="url(#g1)"/>
    <circle cx="120" cy="120" r="94" fill="url(#g2)"/>
    <circle cx="120" cy="120" r="67" fill="#f5f5f5"/>
    <circle cx="120" cy="120" r="66" fill="none" stroke="#161616" stroke-width="2"/>

    <g fill="#f8f8f8">
      <rect x="112" y="20" width="16" height="32" rx="3"/>
      <rect x="112" y="188" width="16" height="32" rx="3"/>
      <rect x="20" y="112" width="32" height="16" rx="3"/>
      <rect x="188" y="112" width="32" height="16" rx="3"/>

      <rect x="44" y="44" width="16" height="30" rx="3" transform="rotate(-45 52 59)"/>
      <rect x="180" y="44" width="16" height="30" rx="3" transform="rotate(45 188 59)"/>
      <rect x="44" y="166" width="16" height="30" rx="3" transform="rotate(45 52 181)"/>
      <rect x="180" y="166" width="16" height="30" rx="3" transform="rotate(-45 188 181)"/>
    </g>

    <g fill="#f5f5f5" font-family="Segoe UI Symbol, Apple Color Emoji, sans-serif" font-size="18" font-weight="700">
      <text x="120" y="72" text-anchor="middle">♣</text>
      <text x="168" y="122" text-anchor="middle">♥</text>
      <text x="120" y="172" text-anchor="middle">♠</text>
      <text x="72" y="122" text-anchor="middle">♦</text>
    </g>
  </g>
</svg>
